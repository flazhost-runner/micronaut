import io.micronaut.build.internal.ext.MicronautCoreExtension
import io.micronaut.build.internal.ext.DefaultMicronautCoreExtension

plugins {
    id "io.micronaut.build.internal.common"
}

micronautBuild {
    enableBom = false
    enableProcessing = false
}

repositories {
    mavenCentral()
    maven {
        url 'https://central.sonatype.com/repository/maven-snapshots/'
        mavenContent {
            snapshotsOnly()
        }
    }
}

configurations.all {
    resolutionStrategy.cacheChangingModulesFor 0, 'seconds'
    resolutionStrategy.cacheDynamicVersionsFor 0, 'seconds'
}

group = projectGroupId

def micronautBuild = (ExtensionAware) project.extensions.getByName("micronautBuild")
def micronautCore = micronautBuild.extensions.create(MicronautCoreExtension, "core", DefaultMicronautCoreExtension, extensions.findByType(VersionCatalogsExtension))
micronautCore.documented.convention(true)

tasks.withType(Test).configureEach {
    useJUnitPlatform()
    jvmArgs '-Xmx2048m'
    systemProperty "micronaut.cloud.platform", "OTHER"
    jvmArgs "--enable-preview"
}

tasks.withType(JavaCompile).configureEach {
    options.fork = true
    options.compilerArgs.add("-Amicronaut.processing.group=$project.group")
    options.compilerArgs.add("-Amicronaut.processing.module=micronaut-$project.name")
    options.compilerArgs.add("-Amicronaut.processing.omit.confprop.injectpoints=true")
    options.forkOptions.memoryMaximumSize = "2g"
}

def moduleInfoJava = file("src/main/java/module-info.java")

if (moduleInfoJava.exists()) {
    pluginManager.withPlugin("java") {
        def sourceSets = extensions.findByType(org.gradle.api.tasks.SourceSetContainer)
        if (sourceSets != null) {
            sourceSets.named("main") {
                java {
                    exclude("module-info.java")
                }
            }
            tasks.named("compileJava", JavaCompile).configure {
                exclude("module-info.java")
                modularity.inferModulePath = false
            }
            def moduleName = providers.provider {
                def matcher = (moduleInfoJava.text =~ /\bmodule\s+([\w.]+)\s*\{/
                )
                if (!matcher.find()) {
                    throw new GradleException("Unable to determine module name from ${moduleInfoJava}")
                }
                matcher.group(1)
            }
            def limitModules = providers.provider {
                def requiresMatcher = (moduleInfoJava.text =~ /\brequires\s+(?:transitive\s+|static\s+)?([\w.]+)\s*;/)
                def modules = new LinkedHashSet<String>()
                modules.add(moduleName.get())
                while (requiresMatcher.find()) {
                    modules.add(requiresMatcher.group(1))
                }
                modules.join(',')
            }
            def modulePath = providers.provider {
                // JPMS doesn't allow split packages on the module-path. Some optional Micronaut
                // RxJava modules ship overlapping packages (e.g. io.micronaut.rxjava3.info).
                // Those are not part of the core module graph we compile module-info against.
                configurations.compileClasspath.files
                    .findAll { f ->
                        // Exclude modules known to cause JPMS split packages or duplicate packages
                        // while compiling module-info.java. These are not part of the module graph
                        // we validate at descriptor compile time.
                        !(
                            f.name.startsWith('micronaut-rxjava2') ||
                            f.name.startsWith('micronaut-rxjava3') ||
                            f.name.startsWith('micronaut-core-processor') ||
                            f.name.contains('sourcegen-model') ||
                            f.name.contains('sourcegen-bytecode-writer')
                        )
                    }
                    .collect { it.absolutePath }
                    .join(File.pathSeparator)
            }
            def addModules = providers.provider {
                // Automatic modules are not always resolved via --limit-modules alone.
                // Explicitly add what we require to make module resolution deterministic.
                def requiresMatcher = (moduleInfoJava.text =~ /\brequires\s+(?:transitive\s+|static\s+)?([\w.]+)\s*;/)
                def modules = new LinkedHashSet<String>()
                while (requiresMatcher.find()) {
                    modules.add(requiresMatcher.group(1))
                }
                modules.isEmpty() ? null : modules.join(',')
            }
            def mainClassesDirs = providers.provider {
                sourceSets.named("main").get().output.classesDirs.asPath
            }
            def compileModuleInfo = tasks.register("compileModuleInfoJava", JavaCompile) {
                dependsOn(tasks.named("classes"))
                source(moduleInfoJava)
                destinationDirectory.set(layout.buildDirectory.dir("classes/java/module-info"))
                classpath = files()
                doFirst {
                    def javaDest = tasks.named("compileJava", JavaCompile).get().destinationDirectory.get().asFile
                    delete(new File(javaDest, "module-info.class"))
                }
                options.compilerArgumentProviders.add(new CommandLineArgumentProvider() {
                    @Override
                    Iterable<String> asArguments() {
                        def args = [
                            "--module-path", modulePath.get(),
                            "--limit-modules", limitModules.get(),
                            "--patch-module", "${moduleName.get()}=${mainClassesDirs.get()}"
                        ]
                        def additional = addModules.get()
                        if (additional) {
                            args.addAll(["--add-modules", additional])
                        }
                        return args
                    }
                })
            }
            tasks.named("jar", Jar).configure {
                dependsOn(compileModuleInfo)
                from(compileModuleInfo.map { it.destinationDirectory }) {
                    include("module-info.class")
                }
            }
        }
    }
}

tasks.withType(GroovyCompile).configureEach {
    options.fork = true
    options.compilerArgs.add("-Amicronaut.processing.group=$project.group")
    options.compilerArgs.add("-Amicronaut.processing.module=micronaut-$project.name")
    groovyOptions.forkOptions.memoryMaximumSize = "2g"
}

// This is for reproducible builds
tasks.withType(Jar).configureEach {
    reproducibleFileOrder = true
    preserveFileTimestamps = false
}

configurations.all {
    resolutionStrategy.dependencySubstitution {
        rootProject.subprojects.each {
            String targetName = ":${it.name}"
            if (it.name.startsWith('micronaut-')) {
                if (it.name.contains('bom')) {
                    substitute platform(module("io.micronaut:micronaut-${it.name}")) using platform(project(targetName)) because "we want to test with what we're building"
                } else {
                    substitute module("io.micronaut:${it.name}") using project(targetName) because "we want to test with what we're building"
                }
            }
        }
    }
}

dependencies {
    annotationProcessor(libs.micronaut.docs.map {
        if (micronautCore.documented.get()) {
            it
        } else {
            null
        }
    }) {
        transitive = false
    }

    api libs.slf4j.api
    compileOnly libs.caffeine

    testAnnotationProcessor projects.micronautHttpValidation

    testImplementation libs.caffeine
    testImplementation libs.managed.groovy
    testImplementation(libs.spock) {
        exclude module: 'groovy-all'
    }

    testImplementation libs.groovy.test.junit5
}

spotless {
    java {
        targetExclude '**/io/micronaut/core/io/scan/AnnotationClassReader.java'
        targetExclude '**/io/micronaut/core/io/scan/Attribute.java'
        targetExclude '**/io/micronaut/core/io/scan/Context.java'
        targetExclude '**/io/micronaut/core/util/clhm/**'
        targetExclude '**/io/micronaut/core/util/AntPathMatcher.java'
        targetExclude '**/io/micronaut/discovery/eureka/client/v2/AmazonInfo.java'
        targetExclude '**/io/micronaut/discovery/eureka/client/v2/DataCenterInfo.java'
        targetExclude '**/io/micronaut/discovery/eureka/client/v2/LeaseInfo.java'
        targetExclude '**/io/micronaut/support/InMemoryJavaFileManager.java'
        targetExclude '**/io/micronaut/scheduling/cron/CronExpression.java'
        targetExclude '**/org/atinject/tck/auto/Tck.kt'
        targetExclude '**/io/micronaut/http/uri/QueryStringDecoder.java'
    }
    format 'javaMisc', {
        targetExclude '**/io/micronaut/core/util/clhm/**'
        targetExclude '**/io/micronaut/http/netty/stream/package-info.java'
    }
}
